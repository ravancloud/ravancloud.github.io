<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Ravan Cloud Support</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Poppins', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .contact-card { max-width: 500px; margin: 50px auto; background: #0a0a0a; border: 1px solid #1a8e1a; border-radius: 15px; padding: 40px 20px; box-shadow: 0 0 15px rgba(26, 142, 26, 0.3); }
        h1 { color: #1a8e1a; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; }
        
        .method { display: flex; align-items: center; justify-content: flex-start; background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-decoration: none; color: white; border: 1px solid #222; transition: 0.3s; }
        .method:hover { border-color: #1a8e1a; transform: translateY(-3px); }
        
        .tg-btn { border-left: 5px solid #0088cc; }
        .mail-btn { border-left: 5px solid #ff4b2b; }

        .timings { margin-top: 30px; font-size: 14px; color: #666; border-top: 1px solid #222; padding-top: 20px; }
        .back-btn { margin-top: 20px; display: inline-block; color: #1a8e1a; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="contact-card">
        <h1>Contact Support</h1>
        <p>Koi bhi sawal ho ya help chahiye? Humse connect karein:</p>

        <a href="https://t.me/Ravancloud_bot" target="_blank" class="method tg-btn">
            <span style="font-size: 24px;">✈️</span>
            <div style="text-align: left; margin-left: 15px;">
                <div style="font-weight: bold;">Telegram Support Bot</div>
                <div style="font-size: 12px; color: #888;">Sabse fast reply yahan milega (@Ravancloud_bot)</div>
            </div>
        </a>

        <a href="mailto:support@ravancloud.com" class="method mail-btn">
            <span style="font-size: 24px;">📧</span>
            <div style="text-align: left; margin-left: 15px;">
                <div style="font-weight: bold;">Email Support</div>
                <div style="font-size: 12px; color: #888;">Official queries ke liye</div>
            </div>
        </a>

        <div class="timings">
            🕒 <b>Working Hours:</b> 10:00 AM - 11:00 PM (IST)<br>
            Reply aane mein 5-30 mins lag sakte hain.
        </div>

        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

</body>
</html>
